name: CI

# Fast PR-level validation. Mirrors what `pnpm typecheck && cargo test` does
# locally so we catch regressions before a release workflow ever runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-rust:
    name: format + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "packages/core -> target\napps/cli -> target"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --package reqforge-core -- -D warnings

  test-core:
    name: cargo test (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (SQLite)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "packages/core -> target"
      - run: cargo test --package reqforge-core --lib

  test-cli:
    name: cargo test (cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/cli -> target"
      - run: cargo test --manifest-path apps/cli/Cargo.toml

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - working-directory: packages/core
        run: cargo audit || echo "Advisories found — review manually"

  audit-npm:
    name: pnpm audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod || echo "Advisories found — review manually"

  coverage:
    name: code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (SQLite)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "packages/core -> target"
      - name: Generate coverage report
        run: cargo tarpaulin --package reqforge-core --out Xml --timeout 300 --exclude-files apps/* --all-features
      - name: Upload to codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          flags: rust
          fail_ci_if_error: false

  frontend:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libatspi2.0-0 libxkbcommon0 libxkbcommon-x11-0 \
            libxrandr2 libgbm1 libpango-1.0-0 libpangoft2-1.0-0 \
            libcairo2 libasound2t64

      - name: Install Playwright browsers (force)
        working-directory: e2e
        run: |
          rm -rf $HOME/.cache/ms-playwright
          pnpm exec playwright install --with-deps chromium --force

      - name: Build frontend
        run: pnpm build
        env:
          TAURI_DISABLE_DEVICE_CHECK: "1"

      - name: Verify dist folder
        run: |
          echo "Checking dist folder..."
          ls -la apps/desktop/dist/ 2>/dev/null || echo "dist folder not found"
          find apps/desktop/dist -type f | head -10

      - name: Serve built frontend on port 1420
        run: |
          if [ ! -d "apps/desktop/dist" ]; then
            echo "Error: apps/desktop/dist directory not found"
            exit 1
          fi
          cd apps/desktop/dist
          nohup python3 -m http.server 1420 > /tmp/server.log 2>&1 &
          sleep 2
          if curl -sI http://localhost:1420/ | grep -q "HTTP"; then
            echo "✓ Server is running"
          else
            echo "✗ Server failed to start. Logs:"
            cat /tmp/server.log
            exit 1
          fi
        env:
          TAURI_DEV_HOST: http://localhost:1420

      - name: Run E2E tests
        working-directory: e2e
        run: pnpm exec playwright test --reporter=github
        env:
          TAURI_DEV_HOST: http://localhost:1420

  sbom:
    name: generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM for Rust (core)
        run: syft packages/core -o cyclonedx-json > sbom-rust-core.json
      - name: Generate SBOM for Rust (CLI)
        run: syft apps/cli -o cyclonedx-json > sbom-rust-cli.json
      - name: Generate SBOM for JavaScript/Node
        run: syft . -o cyclonedx-json > sbom-nodejs.json
      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-*.json
          retention-days: 30
      - name: Upload SBOM to artifact registry (if available)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "SBOMs generated successfully"
          ls -la sbom-*.json

