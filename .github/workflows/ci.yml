name: CI

# Fast PR-level validation. Mirrors what `pnpm typecheck && cargo test` does
# locally so we catch regressions before a release workflow ever runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-rust:
    name: format + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "packages/core -> target\napps/cli -> target"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --package reqforge-core --all-features -- -D warnings

  test-core:
    name: cargo test (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (SQLite)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "packages/core -> target"
      - run: cargo test --package reqforge-core --lib

  test-cli:
    name: cargo test (cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/cli -> target"
      - run: cargo test --manifest-path apps/cli/Cargo.toml --lib

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v5
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit --manifest-path packages/core/Cargo.toml || echo "Advisories found — review manually"

  frontend:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  e2e:
    name: playwright via tauri dev
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build app
        run: pnpm build
        env:
          TAURI_DISABLE_DEVICE_CHECK: "1"
      - name: Install Playwright
        working-directory: e2e
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --reporter=github
        env:
          HOME: /root
