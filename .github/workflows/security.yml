name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # every Monday 08:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─── Rust Security ────────────────────────────────────────────────
  cargo-audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit
        working-directory: packages/core
        continue-on-error: true

      - name: Audit CLI dependencies
        run: cargo audit
        working-directory: apps/cli
        continue-on-error: true

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses and advisories
        run: cargo deny check
        continue-on-error: true

  # ─── npm/pnpm Security ───────────────────────────────────────────
  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod
        continue-on-error: true

      - name: Audit all dependencies
        run: pnpm audit
        continue-on-error: true

  # ─── Dependency Review (PRs only) ────────────────────────────────
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          deny-licenses: GPL-3.0, AGPL-3.0

  # ─── License Compliance ──────────────────────────────────────────
  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check Rust licenses
        uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-license --locked
      - run: cargo license -a --avoid-dev-deps --sorted > /tmp/rust-licenses.txt
        continue-on-error: true
      - name: Flag copyleft licenses
        run: |
          if grep -qiE 'GPL|AGPL|SSPL' /tmp/rust-licenses.txt 2>/dev/null; then
            echo "::warning::Copyleft licenses found in Rust dependencies:"
            grep -iE 'GPL|AGPL|SSPL' /tmp/rust-licenses.txt || true
          else
            echo "✅ No copyleft licenses in Rust dependencies"
          fi

      - name: Check JS licenses
        uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -wD license-checker
      - name: Flag copyleft JS licenses
        run: |
          npx license-checker --production --json --out /tmp/js-licenses.json 2>/dev/null || true
          if [ -f /tmp/js-licenses.json ]; then
            CPL=$(cat /tmp/js-licenses.json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          bad = [k for k,v in data.items() if any(x in (v.get('licenses','') or '').upper() for x in ['GPL','AGPL','SSPL'])]
          for b in bad: print(b)
          " 2>/dev/null || true)
            if [ -n "$CPL" ]; then
              echo "::warning::Copyleft licenses found in JS dependencies:"
              echo "$CPL"
            else
              echo "✅ No copyleft licenses in JS dependencies"
            fi
          fi

  # ─── Secret Scanning ─────────────────────────────────────────────
  secrets-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ─── Container Scanning (Docker images) ──────────────────────────
  container-scan:
    name: Container scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [sync, plugins, telemetry]
    steps:
      - uses: actions/checkout@v7

      - name: Build image for scanning
        run: |
          docker build -t scan-${{ matrix.service }}:latest -f services/${{ matrix.service }}/Dockerfile .

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-${{ matrix.service }}:latest
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"

  # ─── Summary ──────────────────────────────────────────────────────
  security-summary:
    name: Security summary
    runs-on: ubuntu-latest
    needs: [cargo-audit, cargo-deny, pnpm-audit, license-check, secrets-scan, container-scan]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## 🛡️ Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cargo Audit | ${{ needs.cargo-audit.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cargo Deny | ${{ needs.cargo-deny.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pnpm Audit | ${{ needs.pnpm-audit.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-check.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | ${{ needs.secrets-scan.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scanning | ${{ needs.container-scan.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ℹ️ (handled by default setup) |" >> $GITHUB_STEP_SUMMARY
