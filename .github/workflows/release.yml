name: Release

# Builds the ReqForge CLI for every supported platform and uploads
# the artifacts to a GitHub Release.
#
# Notes on platform coverage:
# - x86_64-linux + aarch64-linux (via cross): full Linux support
# - x86_64-windows: native MSVC build on windows runner
# - x86_64-macos: native build on macos runner
# - aarch64-macos: NOT built — GitHub's macOS runners are x86_64
#   only, and cross-compiling macOS targets requires the macOS SDK
#   which isn't available on Linux/Windows runners. Remove from
#   matrix if/when GitHub adds M-series macOS runners.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a draft release?"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  cli:
    name: CLI (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.xz
            binary: reqforge
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.xz
            binary: reqforge
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary: reqforge
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary: reqforge.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64 Linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/cli -> target"
          shared-key: ${{ matrix.target }}

      - name: Build CLI
        shell: bash
        working-directory: apps/cli
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin reqforge
          else
            cargo build --release --target ${{ matrix.target }} --bin reqforge
          fi

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        working-directory: apps/cli
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          BIN="${{ matrix.binary }}"
          if [ ! -f "$BIN_DIR/$BIN" ]; then
            echo "Binary $BIN_DIR/$BIN not found!"
            ls -la "$BIN_DIR/" || true
            exit 1
          fi
          mkdir -p staging
          cp "$BIN_DIR/$BIN" staging/
          (command -v strip >/dev/null && strip "staging/$BIN") || true
          case "${{ matrix.archive }}" in
            tar.xz)
              tar -cJf "../target/${{ matrix.target }}.tar.xz" -C staging .
              ;;
            tar.gz)
              tar -czf "../target/${{ matrix.target }}.tar.gz" -C staging .
              ;;
          esac

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: apps/cli
        run: |
          $BIN_DIR = "target/${{ matrix.target }}/release"
          $BIN = "${{ matrix.binary }}"
          if (-not (Test-Path "$BIN_DIR/$BIN")) {
            Write-Error "Binary $BIN_DIR/$BIN not found!"
            exit 1
          }
          New-Item -ItemType Directory -Path "staging" | Out-Null
          Copy-Item "$BIN_DIR/$BIN" "staging/"
          Compress-Archive -Path "staging/*" -DestinationPath "../target/${{ matrix.target }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: reqforge-cli-${{ matrix.target }}
          path: apps/cli/target/${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: cli
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create / update release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
