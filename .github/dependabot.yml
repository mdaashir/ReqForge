version: 2
updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps): "
      prefix-development: "chore(deps-dev): "
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  - package-ecosystem: "cargo"
    directory: "/apps/cli"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps): "
      prefix-development: "chore(deps-dev): "
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  - package-ecosystem: "cargo"
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps): "
      prefix-development: "chore(deps-dev): "
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # JavaScript/TypeScript dependencies (root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:30"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps): "
      prefix-development: "chore(deps-dev): "
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # JavaScript/TypeScript dependencies (desktop app)
  - package-ecosystem: "npm"
    directory: "/apps/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:45"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps): "
      prefix-development: "chore(deps-dev): "
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # JavaScript/TypeScript dependencies (UI package)
  - package-ecosystem: "npm"
    directory: "/packages/ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps): "
      prefix-development: "chore(deps-dev): "
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "02:00"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci: "
